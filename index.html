<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Be My Valentine 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #ff6a88, #ff99ac, #fad0c4, #ffd1ff);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    overflow: hidden;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .card {
    position: relative;
    z-index: 10;
    background: white;
    width: 90%;
    max-width: 380px;
    padding: 30px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    animation: popIn 0.6s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  h1 {
    color: #ff3e6c;
    margin-bottom: 10px;
  }

  p {
    color: #555;
    margin-bottom: 15px;
  }

  img {
    width: 200px;
    border-radius: 18px;
    margin: 15px 0;
  }

  .buttons {
    margin-top: 20px;
  }

  button {
    padding: 12px 26px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  button:hover {
    transform: scale(1.1);
  }

  #yes {
    background: #ff3e6c;
    color: white;
    margin-right: 10px;
  }

  #no {
    background: #ccc;
    position: absolute;
  }

  .heart {
    position: fixed;
    bottom: -20px;
    font-size: 22px;
    animation: floatHearts 6s linear infinite;
    opacity: 0.8;
    z-index: 1;
  }

  @keyframes floatHearts {
    from { transform: translateY(0); }
    to { transform: translateY(-110vh); }
  }
</style>
</head>

<body>

<div class="card" id="card">
  <h1>Eyy Chellakutty pattakutty 💖</h1>
  <img src="her.jpg" alt="Her Photo">
  <p>I have something important to ask you 😌</p>

  <div class="buttons">
    <button id="yes">Yes 💕</button>
    <button id="no">No 🙈</button>
  </div>
</div>

<script>
  const card = document.getElementById("card");
  const noBtn = document.getElementById("no");

  const questions = [
    {
      title: "Question 1 💭",
      text: "Do you know how special you are to me?",
    },
    {
      title: "Question 2 💫",
      text: "Do you promise to keep smiling like this forever?",
    },
    {
      title: "Final Question 💘",
      text: "Will you be my Valentine? ❤️"
    },
   {
    title: "Question 4 🌙",
    text: "Do you like our late night talks and laughs?",
  },
  {
    title: "Question 5 💕",
    text: "Do you believe we make a great team together?",
  }
  ];

  let step = 0;

  document.body.addEventListener("mouseover", (e) => {
    if (e.target.id === "no") {
      const x = Math.random() * (window.innerWidth - 120);
      const y = Math.random() * (window.innerHeight - 120);
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }
  });

  document.body.addEventListener("click", (e) => {
    if (e.target.id === "yes") {
      step++;
      if (step < questions.length) {
        card.innerHTML = `
          <h1>${questions[step].title}</h1>
          <img src="her.jpg">
          <p>${questions[step].text}</p>
          <div class="buttons">
            <button id="yes">Yes 💖</button>
            <button id="no">No 🙈</button>
          </div>
        `;
      } else {
        showFinal();
      }
    }
  });

  function showFinal() {
    card.innerHTML = `
      <h1>You said YES 💕</h1>
      <img src="her.jpg">
      <p>
        You just made my heart the happiest 💖<br>
        Happy Valentine’s Day ❤️
      </p>
    `;
    spawnHearts();
  }

  function spawnHearts() {
    for (let i = 0; i < 40; i++) {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerText = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }
  }
</script>

</body>
</html>
