<script>
const music = document.getElementById("music");
const card = document.getElementById("card");
const final = document.getElementById("final");

const herName = "YOUR GIRL'S NAME ❤️";

let step = 0;

const questions = [
  `Hey ${herName}`,
  "Do you know how special you are to me?",
  "Do you promise to keep smiling like this forever?",
  "Will you go on many cute dates with me?",
  "Okay… final question 😳"
];

const texts = [
  "I made this just for you 💕",
  "Because you mean the world to me 🌎",
  "Because your smile is my favorite thing 😊",
  "Food, laughs, memories, everything 💑",
  "Will you be my Valentine? 💖"
];

function attachEvents() {
  const yesBtn = document.getElementById("yesBtn");
  const noBtn = document.getElementById("noBtn");

  if (yesBtn) {
    yesBtn.onclick = () => {
      if (step === 0) music.play();

      step++;

      if (step < questions.length) {
        document.getElementById("question").textContent = questions[step];
        document.getElementById("text").textContent = texts[step];
      } else {
        card.style.display = "none";
        final.style.display = "block";
      }
    };
  }

  if (noBtn) {
    noBtn.onmouseover = moveNo;
    noBtn.onclick = moveNo;
  }
}

function moveNo() {
  const noBtn = document.getElementById("noBtn");
  const x = Math.random() * 250 - 125;
  const y = Math.random() * 250 - 125;
  noBtn.style.transform = `translate(${x}px, ${y}px)`;
}

attachEvents();
</script>
