<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Be My Valentine 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #ff6a88, #ff99ac, #fad0c4, #ffd1ff);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
  overflow: hidden;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card {
  position: relative;
  z-index: 10;
  background: white;
  width: 90%;
  max-width: 380px;
  padding: 30px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 0 25px rgba(255, 80, 120, 0.4),
              0 25px 50px rgba(0,0,0,0.25);
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 { color: #ff3e6c; }
p { color: #555; min-height: 40px; }

img {
  width: 200px;
  border-radius: 18px;
  margin: 15px 0;
}

button {
  padding: 12px 26px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
}

#yes {
  background: #ff3e6c;
  color: white;
  margin-right: 10px;
  animation: pulse 1.8s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

#no {
  background: #ccc;
  position: absolute;
}

.cursor {
  display: inline-block;
  width: 8px;
  background: #ff3e6c;
  margin-left: 4px;
  animation: blink 1s infinite;
}
