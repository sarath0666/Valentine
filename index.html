<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Be My Valentine 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #ff6a88, #ff99ac, #fad0c4, #ffd1ff);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
  overflow: hidden;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card {
  position: relative;
  z-index: 10;
  background: white;
  width: 90%;
  max-width: 380px;
  padding: 30px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 25px 50px rgba(0,0,0,0.25);
}

h1 { color: #ff3e6c; }
p { color: #555; min-height: 40px; }

img {
  width: 200px;
  border-radius: 18px;
  margin: 15px 0;
}

button {
  padding: 12px 26px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
}

#yes {
  background: #ff3e6c;
  color: white;
  margin-right: 10px;
}

#no {
  background: #ccc;
  position: absolute;
}

.cursor {
  display: inline-block;
  width: 8px;
  background: #ff3e6c;
  margin-left: 4px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,50%,100% { opacity: 1; }
  25%,75% { opacity: 0; }
}

.floating-emoji {
  position: fixed;
  bottom: -30px;
  font-size: 22px;
  opacity: 0.7;
  animation: floatUp linear forwards;
  pointer-events: none;
  z-index: 1;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-110vh); opacity: 0; }
}

.heart {
  position: fixed;
  bottom: -20px;
  font-size: 22px;
  animation: floatUp 6s linear infinite;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="card" id="card">
  <h1>Hey Beautiful 💖</h1>
  <img src="IMG_0180.jpeg" alt="Photo">
  <p id="questionText">I have something important to ask you 😌</p>

  <div class="buttons">
    <button id="yes">Okay 💕</button>
    <button id="no">No 🙈</button>
  </div>
</div>

<script>
const card = document.getElementById("card");

const questions = [
  "Do you know how special you are to me?",
  "Do you promise to keep smiling like this forever?",
  "Do you enjoy the time we spend together?",
  "Do you like our late night talks and laughs?",
  "Do you believe we make a great team together?",
  "Will you be my Valentine? ❤️"
];

const images = [
  "IMG_0180.jpeg",
  "IMG_1617.png",
  "IMG_1619.png",
  "IMG_1622.png",
  "IMG_2760.jpeg",
  "IMG_9976.jpeg"
];

let step = 0;

function typeText(element, text, speed = 60) {
  element.innerHTML = '<span class="typed"></span><span class="cursor"></span>';
  const typed = element.querySelector(".typed");

  let i = 0;
  function typing() {
    if (i < text.length) {
      typed.textContent += text[i];
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

function moveNo(btn) {
  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 120);
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

function nextQuestion() {
  step++;

  if (step < questions.length) {
    card.innerHTML = `
      <h1>Question ${step} 💭</h1>
      <img src="${images[step]}" alt="Photo">
      <p id="questionText"></p>
      <div class="buttons">
        <button id="yes">Yes 💖</button>
        <button id="no">No 🙈</button>
      </div>
    `;

    typeText(document.getElementById("questionText"), questions[step], 60);
  } else {
    showFinal();
  }
}

function showFinal() {
  card.innerHTML = `
    <h1>You said YES 💕</h1>
    <img src="${images[images.length - 1]}" alt="Photo">
    <p>
      From the day I met you,<br>
      everything became brighter ✨<br><br>
      Happy Valentine’s Day ❤️
    </p>
  `;
  spawnHearts();
}

function spawnHearts() {
  for (let i = 0; i < 40; i++) {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
  }
}

/* EVENT DELEGATION (buttons always work) */
document.addEventListener("click", function(e) {
  if (e.target.id === "yes") nextQuestion();
  if (e.target.id === "no") moveNo(e.target);
});

document.addEventListener("mouseover", function(e) {
  if (e.target.id === "no") moveNo(e.target);
});

/* Floating emojis */
const emojis = ["💖","💕","✨","🌸","💘","⭐","💫"];

setInterval(() => {
  const emoji = document.createElement("div");
  emoji.className = "floating-emoji";
  emoji.innerText = emojis[Math.floor(Math.random()*emojis.length)];
  emoji.style.left = Math.random()*100+"vw";
  emoji.style.fontSize = (Math.random()*15+18)+"px";
  emoji.style.animationDuration = (Math.random()*4+4)+"s";
  document.body.appendChild(emoji);
  setTimeout(()=>emoji.remove(),8000);
},700);
</script>

</body>
</html>
