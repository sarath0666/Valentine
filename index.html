<script>
const music = document.getElementById("music");
const questionEl = document.getElementById("question");
const textEl = document.getElementById("text");
const card = document.getElementById("card");
const finalCard = document.getElementById("final");

const herName = "YOUR GIRL'S NAME ❤️";

let step = 0;

const questions = [
  `Hey ${herName}`,
  "Do you know how special you are to me?",
  "Do you promise to keep smiling like this forever?",
  "Will you go on many cute dates with me?",
  "Okay… final question 😳"
];

const texts = [
  "I made this just for you 💕",
  "Because you mean the world to me 🌎",
  "Because your smile is my favorite thing 😊",
  "Food, laughs, memories, everything 💑",
  "Will you be my Valentine? 💖"
];

// YES BUTTON
document.addEventListener("click", function(e) {
  if (e.target && e.target.id === "yesBtn") {

    if (step === 0) {
      music.play().catch(()=>{}); // prevents autoplay errors
    }

    step++;

    if (step < questions.length) {
      questionEl.textContent = questions[step];
      textEl.textContent = texts[step];
    } else {
      card.style.display = "none";
      finalCard.style.display = "block";
    }
  }
});

// NO BUTTON (mobile + desktop)
document.addEventListener("mouseover", function(e) {
  if (e.target && e.target.id === "noBtn") {
    moveNo(e.target);
  }
});

document.addEventListener("click", function(e) {
  if (e.target && e.target.id === "noBtn") {
    moveNo(e.target);
  }
});

function moveNo(btn) {
  const x = Math.random() * 200 - 100;
  const y = Math.random() * 200 - 100;
  btn.style.transform = `translate(${x}px, ${y}px)`;
}
</script>
