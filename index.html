<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Be My Valentine 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #ff6a88, #ff99ac, #fad0c4, #ffd1ff);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    overflow: hidden;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .card {
    position: relative;
    z-index: 10;
    background: white;
    width: 90%;
    max-width: 360px;
    padding: 30px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    animation: popIn 0.8s ease;
  }

  @keyframes popIn {
    from {
      transform: scale(0.8);
      opacity: 0;
    }
    to {
      transform: scale(1);
      opacity: 1;
    }
  }

  h1 {
    color: #ff3e6c;
    margin-bottom: 10px;
  }

  p {
    color: #555;
    margin-bottom: 15px;
  }

  .images {
    position: relative;
    height: 180px;
    margin: 15px 0;
  }

  .images img {
    width: 180px;
    border-radius: 15px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation: slideshow 9s infinite;
  }

  .images img:nth-child(1) { animation-delay: 0s; }
  .images img:nth-child(2) { animation-delay: 3s; }
  .images img:nth-child(3) { animation-delay: 6s; }

  @keyframes slideshow {
    0% { opacity: 0; }
    10% { opacity: 1; }
    30% { opacity: 1; }
    40% { opacity: 0; }
    100% { opacity: 0; }
  }

  .buttons {
    margin-top: 20px;
  }

  button {
    padding: 12px 26px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  button:hover {
    transform: scale(1.1);
  }

  #yes {
    background: #ff3e6c;
    color: white;
    margin-right: 10px;
  }

  #no {
    background: #ccc;
    position: absolute;
  }

  .heart {
    position: fixed;
    bottom: -20px;
    font-size: 22px;
    animation: floatHearts 6s linear infinite;
    opacity: 0.8;
    z-index: 1;
  }

  @keyframes floatHearts {
    from { transform: translateY(0); }
    to { transform: translateY(-110vh); }
  }
</style>
</head>

<body>

<div class="card" id="card">
  <h1>Will you be my Valentine? 💘</h1>

  <div class="images">
    <img src="https://i.imgur.com/QpY5w1C.gif">
    <img src="https://i.imgur.com/7yUvePI.gif">
    <img src="https://i.imgur.com/MDJZ0zS.gif">
  </div>

  <p>I have something special to ask you 😌</p>

  <div class="buttons">
    <button id="yes">Yes 💖</button>
    <button id="no">No 🙈</button>
  </div>
</div>

<script>
  const noBtn = document.getElementById("no");
  const yesBtn = document.getElementById("yes");
  const card = document.getElementById("card");

  noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  yesBtn.addEventListener("click", () => {
    card.innerHTML = `
      <h1>You said YES 💕</h1>
      <div class="images">
        <img src="https://i.imgur.com/7yUvePI.gif" style="opacity:1;">
      </div>
      <p>You just made my heart so happy 😍<br>
      Happy Valentine’s Day 💖</p>
    `;
    spawnHearts();
  });

  function spawnHearts() {
    for (let i = 0; i < 30; i++) {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerText = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 6000);
    }
  }
</script>

</body>
</html>
