<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For You ❤️</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(-45deg, #ff758c, #ff7eb3, #fad0c4, #ffd1ff);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

@keyframes bg {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card {
  background: white;
  width: 90%;
  max-width: 360px;
  border-radius: 25px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  position: relative;
  z-index: 5;
}

img {
  width: 100%;
  border-radius: 20px;
  margin-bottom: 15px;
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

h2 {
  margin: 10px 0;
  color: #ff4d6d;
}

p {
  font-size: 16px;
  color: #444;
}

.buttons {
  margin-top: 20px;
  position: relative;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
}

#yesBtn {
  background: #ff4d6d;
  color: white;
}

#noBtn {
  background: #ddd;
  position: absolute;
}

.final {
  display: none;
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="assets/music.mp3" type="audio/mpeg">
</audio>

<div class="card" id="card">
  <img src="assets/her.jpg" alt="Her Photo" />
  <h2 id="question">Hey ❤️</h2>
  <p id="text">I have something important to ask you…</p>

  <div class="buttons">
    <button id="yesBtn">Yes 😊</button>
    <button id="noBtn">No 😈</button>
  </div>
</div>

<div class="card final" id="final">
  <h2>🎁 Surprise!</h2>
  <p>
    From the moment you came into my life,<br>
    everything became brighter 💕<br><br>
    Will you be my Valentine? 🌹
  </p>
</div>

<script>
const music = document.getElementById("music");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const question = document.getElementById("question");
const text = document.getElementById("text");
const card = document.getElementById("card");
const final = document.getElementById("final");

const herName = "Akishga ❤️";

let step = 0;

const questions = [
  `Hey ${Akishga}`,
  "Do you know how special you are to me?",
  "Do you promise to keep smiling like this forever?",
  "Will you go on many cute dates with me?",
  "Okay… final question 😳"
];

const texts = [
  "I made this just for you 💕",
  "Because you mean the world to me 🌎",
  "Because your smile is my favorite thing 😊",
  "Food, laughs, memories, everything 💑",
  "Will you be my Valentine? 💖"
];

yesBtn.addEventListener("click", () => {
  if (step === 0) music.play();

  step++;
  if (step < questions.length) {
    question.textContent = questions[step];
    text.textContent = texts[step];
  } else {
    card.style.display = "none";
    final.style.display = "block";
  }
});

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("click", moveNo);

function moveNo() {
  const x = Math.random() * 200 - 100;
  const y = Math.random() * 200 - 100;
  noBtn.style.transform = `translate(${x}px, ${y}px)`;
}
</script>

</body>
</html>
